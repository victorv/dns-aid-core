name: Release

on:
  push:
    tags:
      - "v*"

# Workflow defaults to read-only (principle of least privilege).
# The build job below escalates to the writes it actually needs.
permissions:
  contents: read

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write     # required to create the GitHub Release
      id-token: write     # required for Sigstore keyless OIDC signing

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0  # Full history needed for git-cliff changelog

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build cyclonedx-bom

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: dist
          path: dist/

      - name: Install package for SBOM
        run: pip install dist/*.whl

      - name: Generate SBOM
        run: cyclonedx-py environment -o sbom.json --output-format json

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          # Pin the cosign binary to the 2.x line. cosign 3.x changed
          # `sign-blob` bundle handling ("create bundle file: open : no such
          # file or directory") and broke the --output-signature /
          # --output-certificate invocation below. v2.x matches the signing
          # behavior the workflow was written for (and that shipped 0.23.0).
          cosign-release: "v2.6.3"

      - name: Sign release artifacts
        run: |
          for f in dist/*.whl dist/*.tar.gz; do
            cosign sign-blob --yes "$f" --output-signature "${f}.sig" --output-certificate "${f}.pem"
          done
          cosign sign-blob --yes sbom.json --output-signature sbom.json.sig --output-certificate sbom.json.pem

      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.whl
            dist/*.whl.sig
            dist/*.whl.pem
            dist/*.tar.gz
            dist/*.tar.gz.sig
            dist/*.tar.gz.pem
            sbom.json
            sbom.json.sig
            sbom.json.pem

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/dns-aid/
    permissions:
      id-token: write  # Trusted publisher OIDC

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  publish-to-mcp-registry:
    name: Publish to MCP Registry
    # Runs after PyPI so the just-published README (with the mcp-name tag) is
    # live for the registry's PyPI-ownership validation.
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC for `mcp-publisher login github-oidc`

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install mcp-publisher (pinned + checksum-verified)
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher

      - name: Sync server.json version to the release tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.json.tmp
          mv server.json.tmp server.json

      - name: Authenticate via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
