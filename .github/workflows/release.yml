name: Release

on:
  push:
    tags:
      - "v*"

# Workflow defaults to read-only (principle of least privilege).
# The build job below escalates to the writes it actually needs.
permissions:
  contents: read

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write     # required to create the GitHub Release
      id-token: write     # required for Sigstore keyless OIDC signing

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0  # Full history needed for git-cliff changelog

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build cyclonedx-bom

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: dist
          path: dist/

      - name: Install package for SBOM
        run: pip install dist/*.whl

      - name: Generate SBOM
        run: cyclonedx-py environment -o sbom.json --output-format json

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign release artifacts
        run: |
          for f in dist/*.whl dist/*.tar.gz; do
            cosign sign-blob --yes "$f" --output-signature "${f}.sig" --output-certificate "${f}.pem"
          done
          cosign sign-blob --yes sbom.json --output-signature sbom.json.sig --output-certificate sbom.json.pem

      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.whl
            dist/*.whl.sig
            dist/*.whl.pem
            dist/*.tar.gz
            dist/*.tar.gz.sig
            dist/*.tar.gz.pem
            sbom.json
            sbom.json.sig
            sbom.json.pem

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/dns-aid/
    permissions:
      id-token: write  # Trusted publisher OIDC

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
